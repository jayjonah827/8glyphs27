# Render Blueprint — Web Service runs from GLYPH8/ (server.py + requirements.txt)
version: "1"
projects:
- name: 8glyphs27
  environments:
  - name: Production
    services:
    - type: web
      name: 8glyphs27
      runtime: python
      repo: https://github.com/jayjonah827/8glyphs27
      plan: free
      region: oregon
      buildCommand: pip install --upgrade pip && pip install -r requirements.txt
      startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
      autoDeployTrigger: commit
      rootDir: GLYPH8
      healthCheckPath: /health
